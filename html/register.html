<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="form-container_reg">
        <h2>Register Form</h2>
        <form action="register_controller.php" method="POST">
            <div class="input-group">
                <input type="text" name="user_name" id="user_name" placeholder="Fullname" required>

                <input type="text" name="email" id="email" placeholder="Email" required>

                <input type="tel" name="phone" id="phone" placeholder="Phone">
                
                <input type="password" name="password" id="password" placeholder="Password" required>

                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>

                <div style="margin-bottom: 15px;">
                    <input class="radio" type="radio" id="terms" required> 
                    <label for="terms" class="rdec">Agree to Terms and Conditions</label>
                </div>

                <button type="submit" class="btn">Register</button>
                
                <p class="rdec"><a href="index_1.html">Already have an account? Click here to Login</a></p>
            </div>
        </form>
    </div>
</body>
</html>
